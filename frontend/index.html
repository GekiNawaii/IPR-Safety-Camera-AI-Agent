<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HumanTrack — Live Camera</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-wrapper">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🎯</span>
        <span class="logo-text">HumanTrack</span>
      </div>
      <div class="header-badges">
        <!-- Model status badge -->
        <div id="model-badge" class="model-badge loading">
          <span class="model-dot"></span>
          <span id="model-text">Loading…</span>
        </div>
        <!-- Camera status badge -->
        <div id="status-badge" class="status-badge idle">
          <span class="status-dot"></span>
          <span id="status-text">Idle</span>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="main-content">
      <!-- Camera View -->
      <div class="camera-container">
        <div class="camera-frame">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="canvas"></canvas>

          <!-- HUD overlays -->
          <div class="hud hud-tl">LIVE</div>
          <div class="hud hud-tr" id="hud-fps">FPS: --</div>
          <div class="hud hud-bl" id="hud-objects">Humans: 0</div>
          <div class="hud hud-br" id="hud-res">RES: --</div>

          <!-- Placeholder when camera is off -->
          <div class="camera-placeholder" id="placeholder">
            <div class="placeholder-icon">👤</div>
            <p>Camera is not started</p>
            <p class="placeholder-sub">Press <strong>Start Camera</strong> below</p>
          </div>
        </div>
      </div>

      <!-- Controls Panel -->
      <aside class="controls-panel">
        <!-- Camera -->
        <section class="control-section">
          <h2 class="section-title">Camera</h2>
          <button id="btn-start" class="btn btn-primary" onclick="startCamera()">
            <span>▶ Start Camera</span>
          </button>
          <button id="btn-stop" class="btn btn-danger" onclick="stopCamera()" disabled>
            <span>⏹ Stop Camera</span>
          </button>
        </section>

        <!-- Human Tracking -->
        <section class="control-section">
          <h2 class="section-title">Human Tracking</h2>

          <div class="info-chip">
            <span class="info-icon">🤖</span>
            <span>24/7 continuous — detects humans whether moving or still</span>
          </div>

          <div class="slider-group">
            <div class="slider-row">
              <label>Confidence Threshold
                <span class="value-badge" id="val-confidence">50%</span>
              </label>
              <input type="range" id="slider-confidence" min="0.30" max="0.95" step="0.05" value="0.50"
                     oninput="updateConfidence(this.value)" />
            </div>

            <div class="slider-row">
              <label>Detection Interval
                <span class="value-badge" id="val-interval">150ms</span>
              </label>
              <input type="range" id="slider-interval" min="50" max="500" step="50" value="150"
                     oninput="updateDetectInterval(this.value)" />
            </div>

            <div class="slider-row">
              <label>Box Padding (px)
                <span class="value-badge" id="val-padding">8</span>
              </label>
              <input type="range" id="slider-padding" min="0" max="40" value="8"
                     oninput="updatePadding(this.value)" />
            </div>
          </div>
        </section>

        <!-- Display -->
        <section class="control-section">
          <h2 class="section-title">Display</h2>

          <div class="toggle-row">
            <label for="toggle-labels">Show Labels</label>
            <div class="toggle-wrapper">
              <input type="checkbox" id="toggle-labels" checked onchange="toggleLabels(this.checked)" />
              <label for="toggle-labels" class="toggle-label"></label>
            </div>
          </div>

          <div class="toggle-row">
            <label for="toggle-mirror">Mirror View</label>
            <div class="toggle-wrapper">
              <input type="checkbox" id="toggle-mirror" checked onchange="toggleMirror(this.checked)" />
              <label for="toggle-mirror" class="toggle-label"></label>
            </div>
          </div>
        </section>

        <!-- Stats -->
        <section class="control-section stats-section">
          <h2 class="section-title">Statistics</h2>
          <div class="stat-grid">
            <div class="stat-card">
              <span class="stat-value" id="stat-objects">0</span>
              <span class="stat-label">Humans</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-fps">0</span>
              <span class="stat-label">FPS</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-largest">—</span>
              <span class="stat-label">Largest (px²)</span>
            </div>
            <div class="stat-card">
              <span class="stat-value" id="stat-frames">0</span>
              <span class="stat-label">Frames</span>
            </div>
          </div>
        </section>
      </aside>
    </main>
  </div>

  <!-- TensorFlow.js + COCO-SSD (runs 100% locally in browser after download) -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
